name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt needs to run on:"
            echo "$diff"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./... -race -count=1

      - name: build
        run: go build -o e-gov-lawapi-v2 ./cmd/e-gov-lawapi-v2
